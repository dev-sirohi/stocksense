services:
    db:
        image: pgvector/pgvector:pg16
        container_name: stocksense_db
        environment:
            POSTGRES_USER: stocksense
            POSTGRES_PASSWORD: stocksense123
            POSTGRES_DB: stocksense
        ports:
            - "5432:5432"
        volumes:
            - pgdata:/var/lib/postgresql/data
        healthcheck:
            test: ["CMD-SHELL", "pg_isready -U stocksense -d stocksense"]
            interval: 5s
            timeout: 5s
            retries: 5

    redis:
        image: redis:7-alpine
        container_name: stocksense_redis
        ports:
            - "6379:6379"
        # maxmemory: evict least-recently-used keys when memory is full.
        # For local dev, 256mb is more than enough for ~500 cached responses.
        command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
        volumes:
            - redisdata:/data
        healthcheck:
            test: ["CMD", "redis-cli", "ping"]
            interval: 5s
            timeout: 3s
            retries: 5

volumes:
    pgdata:
    redisdata:
